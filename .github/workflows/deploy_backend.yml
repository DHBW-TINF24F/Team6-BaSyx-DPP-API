# ─────────────────────────────────────────────────────────────────────────────
# DPP Backend — Build, Push & Deploy
#
# Triggers:
#   - Push to feat/server-deploy branch (temporary — change to main for production)
#   - Manual "Run workflow" button (workflow_dispatch)
#
# Jobs:
#   1. build  — compiles the Docker image via the multi-stage Dockerfile and
#               pushes it to GHCR using the automatic GITHUB_TOKEN.
#   2. deploy — SSHes into the production server and calls /opt/dpp/deploy.sh,
#               which logs into GHCR, pulls the new image, and restarts the
#               container. Finishes with a Spring Actuator health check.
#
# Secrets used (all must exist in the org/repo — see table below):
#
#   Secret              | Source
#   ──────────────────────────────────────────────────────────────────
#   SSH_HOST            | shared org secret (same as Swagger deploy)
#   SSH_PORT            | shared org secret
#   SSH_PRIVATE_KEY     | shared org secret
#   GHCR_USERNAME       | shared org secret
#   GHCR_TOKEN          | shared org secret (read:packages scope)
#   DPP_API_URL         | base URL of the running DPP API for health check
#                       | e.g. http://YOUR_SERVER_IP:8080
#
# Action versions (verified April 2026):
#   actions/checkout            v4
#   docker/setup-buildx-action  v4
#   docker/login-action         v4
#   docker/metadata-action      v5   (v5.8.0 — latest)
#   docker/build-push-action    v7
#   appleboy/ssh-action         v1.2.5
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy Backend
 
on:
  push:
    branches:
      - feat/server-deploy      # ← temporary; change to main before going to production
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deployment"
        required: false
        default: "Manual trigger"
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
 
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build the Docker image and push it to GHCR
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
 
    # GITHUB_TOKEN needs packages:write to push to GHCR.
    # This is the automatic per-run token — no PAT required.
    permissions:
      contents: read
      packages: write
 
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
 
      # Uses the automatic GITHUB_TOKEN — no manual credentials needed for pushing.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      # Three tags per build:
      #   :latest      → newest image (only on default branch)
      #   :<branch>    → e.g. feat-server-deploy
      #   :sha-<short> → immutable commit pin — reference this for rollbacks
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
 
      # Registry-based layer cache stored in GHCR under :buildcache.
      # The Dockerfile's split pom.xml/src copy layers mean source-only
      # changes skip the full mvn dependency:go-offline (~3-5 min saved).
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./EXECUTABLE/dpp-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false
 
      - name: Write build summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
 
# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy to production server
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build             # only runs after a successful build job
    environment: production  # create in Settings → Environments for approval gates
 
    steps:
      # GHCR_USERNAME and GHCR_TOKEN are injected as environment variables into
      # the SSH session. /opt/dpp/deploy.sh reads them to authenticate with GHCR
      # before pulling the updated image.
      #
      # The script block only contains the server-side script call — nothing
      # sensitive is embedded here, making this safe for a public repository.
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            /home/deploy/basyx/deploy.sh
 
      # Spring Actuator's /actuator/health returns {"status":"UP"} once the
      # application is fully started. We allow 25s for the JVM to boot, then
      # retry up to 10 times with 10-second gaps (max ~125s total).
      - name: Wait for JVM startup
        run: sleep 25
 
      - name: Health check via Spring Actuator
        run: |
          echo "Polling ${{ secrets.APP_HOST_URL }}/actuator/health ..."
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 10 \
            --retry-connrefused \
            "${{ secrets.APP_HOST_URL }}/actuator/health" | tee /tmp/health.json
          echo ""
          STATUS=$(python3 -c "import sys,json; print(json.load(open('/tmp/health.json')).get('status','UNKNOWN'))")
          echo "Application status: $STATUS"
          if [ "$STATUS" \!= "UP" ]; then
            echo "::error::Health check failed — application status: $STATUS"
            exit 1
          fi
          echo "Deployment verified successfully."
 
      - name: Write deployment summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ secrets.SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.actor }}\` via \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY