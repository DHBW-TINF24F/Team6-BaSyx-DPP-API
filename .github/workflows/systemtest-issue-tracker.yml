name: Systemtest Issue Tracker
on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main
      - testing
  workflow_dispatch:

permissions:
  issues: write

jobs:
  test-and-track-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: 'SOURCE/aas-web-ui/yarn.lock'

      - name: Install dependencies
        working-directory: SOURCE/aas-web-ui
        run: yarn install

      - name: Run tests (with coverage)
        id: run-tests
        working-directory: SOURCE/aas-web-ui
        run: |
          set -o pipefail
          yarn test:coverage 2>&1 | tee test-results.log

          # Keep last 200 lines of output to avoid huge issue bodies
          tail -n 200 test-results.log > test-results-trimmed.log

          echo "test_log<<EOF" >> $GITHUB_OUTPUT
          cat test-results-trimmed.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create issue on test failure
        if: steps.run-tests.outcome == 'failure'
        uses: peter-evans/create-issue@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Systemtest Failure: Tests failed on ${{ github.ref }}"
          body: |
            ## Systemtest Failure

            The automated system tests have failed.

            **Triggered by:** ${{ github.event_name }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Test Output (last 200 lines)
            ```
            ${{ steps.run-tests.outputs.test_log }}
            ```

            Please investigate the test failures and fix the issues.

            /cc @${{ github.actor }}
          labels: "bug,systemtest"
          assignees: "${{ github.actor }}"

      - name: Upload test coverage
        if: steps.run-tests.outcome == 'success'
        uses: codecov/codecov-action@v3
        with:
          file: SOURCE/aas-web-ui/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella