# ─────────────────────────────────────────────────────────────────────────────
# DPP Frontend — Build, Push & Deploy
#
# Triggers:
#   - Merged pull request to main branch (for production)
#   - Manual "Run workflow" button (workflow_dispatch)
#
# Jobs:
#   1. build  — compiles the Docker image via the multi-stage Dockerfile and
#               pushes it to GHCR using the automatic GITHUB_TOKEN.
#   2. deploy — SSHes into the production server and calls /home/deploy/basyx/deploy-frontend.sh,
#               which logs into GHCR, pulls the new image, and restarts the
#               container. Finishes with a Spring Actuator health check.
#
# Secrets used (all must exist in the org/repo — see table below):
#
#   Secret              | Source
#   ──────────────────────────────────────────────────────────────────
#   SSH_HOST            | shared org secret (same as Swagger deploy)
#   SSH_PORT            | shared org secret
#   SSH_PRIVATE_KEY     | shared org secret
#   GHCR_USERNAME       | shared org secret
#   GHCR_TOKEN          | shared org secret (read:packages scope)
#
# Action versions (verified April 2026):
#   actions/checkout            v4
#   docker/setup-buildx-action  v4
#   docker/login-action         v4
#   docker/metadata-action      v5   (v5.8.0 — latest)
#   docker/build-push-action    v7
#   appleboy/ssh-action         v1.2.5
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy Frontend
 
on:
  workflow_dispatch:
  pull_request_target:
    types: [closed]
    branches:
      - main
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
 
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build the Docker image and push it to GHCR
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  check:
    name: Check PR Labels
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'Deploy – Frontend')
      )
    steps:
      - run: echo "Condition passed"

  build:
    needs: check
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
 
    # GITHUB_TOKEN needs packages:write to push to GHCR.
    # This is the automatic per-run token — no PAT required.
    permissions:
      contents: read
      packages: write
 
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
 
      # Uses the automatic GITHUB_TOKEN — no manual credentials needed for pushing.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      # Three tags per build:
      #   :latest      → newest image (only on default branch)
      #   :<branch>    → e.g. feat-server-deploy
      #   :sha-<short> → immutable commit pin — reference this for rollbacks
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
 
      # Registry-based layer cache stored in GHCR under :buildcache.
      # The Dockerfile's split pom.xml/src copy layers mean source-only
      # changes skip the full mvn dependency:go-offline (~3-5 min saved).
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./SOURCE/frontend/aas-web-ui
          file: ./SOURCE/frontend/aas-web-ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false
 
      - name: Write build summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
 
# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy to production server
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build             # only runs after a successful build job
    environment: production  # create in Settings → Environments for approval gates
 
    steps:
      # GHCR_USERNAME and GHCR_TOKEN are injected as environment variables into
      # the SSH session. /opt/dpp/deploy.sh reads them to authenticate with GHCR
      # before pulling the updated image.
      #
      # The script block only contains the server-side script call — nothing
      # sensitive is embedded here, making this safe for a public repository.
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            /home/deploy/basyx/deploy-frontend.sh
 
      # TODO: Health Check
 
      - name: Write deployment summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ secrets.SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.actor }}\` via \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY