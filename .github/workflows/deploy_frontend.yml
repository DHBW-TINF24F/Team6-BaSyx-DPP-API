# ─────────────────────────────────────────────────────────────────────────────
# DPP Frontend — Build, Push & Deploy
#
# Triggers:
#   - Merged pull request to main branch (for production)
#   - Manual "Run workflow" button (workflow_dispatch)
#
# Jobs:
#   1. build  — compiles the Docker image via the multi-stage Dockerfile and
#               pushes it to GHCR using the automatic GITHUB_TOKEN.
#   2. deploy — SSHes into the production server and calls /home/deploy/basyx/deploy-frontend.sh,
#               which logs into GHCR, pulls the new image, and restarts the
#               container. Finishes with an HTTP health check against the nginx
#               endpoint (nginx listens on port 3000 inside the container).
#
# Secrets used (all must exist in the org/repo — see table below):
#
#   Secret              | Source
#   ──────────────────────────────────────────────────────────────────────────
#   SSH_HOST            | shared org secret (same as backend deploy)
#   SSH_PORT            | shared org secret
#   SSH_PRIVATE_KEY     | shared org secret
#   GHCR_USERNAME       | shared org secret
#   GHCR_TOKEN          | shared org secret (read:packages scope)
#   FRONTEND_URL        | base URL of the running frontend for health check
#                       | e.g. http://YOUR_SERVER_IP:3000 (or https://your.domain)
#
# Action versions (verified April 2026):
#   actions/checkout            v4
#   docker/setup-buildx-action  v4
#   docker/login-action         v4
#   docker/metadata-action      v5   (v5.8.0 — latest)
#   docker/build-push-action    v7
#   appleboy/ssh-action         v1.2.5
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy Frontend

on:
  workflow_dispatch:
  pull_request_target:
    types: [closed]
    branches:
      - main

  # Testing purposes only
  push:
    branches:
      - feat/server-deploy

env:
  REGISTRY: ghcr.io
  # Append -frontend to avoid colliding with the backend image in the same repo.
  # Both workflows share github.repository — without the suffix they would
  # overwrite each other's :latest tag in GHCR.
  IMAGE_NAME: ${{ github.repository }}-frontend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build the Docker image and push it to GHCR
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  check:
    name: Check PR Labels
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'Deploy – Frontend')
      )
    steps:
      - run: echo "Condition passed"

  build:
    #needs: check
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    # GITHUB_TOKEN needs packages:write to push to GHCR.
    # This is the automatic per-run token — no PAT required.
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SOURCE/frontend is a Git submodule — without this flag the build
          # context (./SOURCE/frontend/aas-web-ui) would be an empty directory
          # and the Docker build would fail.
          submodules: recursive

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Uses the automatic GITHUB_TOKEN — no manual credentials needed for pushing.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Three tags per build:
      #   :latest      → newest image (only on default branch)
      #   :<branch>    → e.g. feat-server-deploy
      #   :sha-<short> → immutable commit pin — reference this for rollbacks
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      # Registry-based layer cache stored in GHCR under :buildcache.
      # The yarn install / node_modules layer is expensive (~2-4 min); the cache
      # skips it when only src/* files changed.
      #
      # VITE_APP_* build args are optional but recommended: they let the running
      # app surface its own version, commit, and build date in the UI/about page.
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./SOURCE/frontend/aas-web-ui
          file: ./SOURCE/frontend/aas-web-ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ github.ref_name }}
            VITE_APP_COMMIT_SHA=${{ github.sha }}
            VITE_APP_BUILD_DATE=${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false

      - name: Write build summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy to production server
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build             # only runs after a successful build job
    #environment: production  # create in Settings → Environments for approval gates

    steps:
      # GHCR_USERNAME and GHCR_TOKEN are injected as environment variables into
      # the SSH session. /home/deploy/basyx/deploy-frontend.sh reads them to
      # authenticate with GHCR before pulling the updated image.
      #
      # The script block only contains the server-side script call — nothing
      # sensitive is embedded here, making this safe for a public repository.
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            /home/deploy/basyx/deploy-frontend.sh

      # nginx starts in a few seconds, but we give the container a moment to
      # fully initialise before hitting it. Then we retry up to 10 times with
      # 10-second gaps (max ~110 s total).
      #
      # This is a plain HTTP check — no JSON parsing needed for a static SPA.
      # A 200 response from the root path confirms nginx is serving correctly.
      - name: Wait for nginx startup
        run: sleep 10

      - name: Health check — nginx HTTP 200
        run: |
          echo "Polling ${{ secrets.FRONTEND_URL }} ..."
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 10 \
            --retry-connrefused \
            --max-time 10 \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n" \
            "${{ secrets.FRONTEND_URL }}/"
          echo "Health check passed — frontend is up."

      - name: Write deployment summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ secrets.SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.actor }}\` via \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
