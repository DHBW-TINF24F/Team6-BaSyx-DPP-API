name: Deploy Swagger Specification

on:
  workflow_dispatch:
  pull_request_target:
    types: [closed]
    branches:
      - main

jobs:
  check:
    name: Check PR Labels
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'Deploy – Swagger')
      )
    steps:
      - run: echo "Condition passed"

  deploy-swagger:
    needs: check
    name: Deploy Swagger Specification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy OpenAPI file via scp
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "EXECUTABLE/swagger/din18222.yaml"
          target: "/srv/uni/swe-basyx/swagger-spec/"
          strip_components: 2

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            /srv/uni/swe-basyx/load_swagger.sh